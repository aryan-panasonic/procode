name: Build and deploy Node.js app to Azure Web App - planogramchatbot

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
      AZURE_OPENAI_EMBED_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBED_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_SSL: ${{ secrets.POSTGRES_SSL }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build

      - name: Prepare and zip standalone package
        run: |
          # Copy public assets and static files into standalone
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

          # Add a minimal package.json so Azure Oryx knows the start command
          cat > .next/standalone/package.json << 'EOF'
          {
            "name": "retail-ai-platform",
            "version": "0.1.0",
            "scripts": { "start": "node server.js" }
          }
          EOF

          # Zip from inside standalone so server.js is at the root of the zip
          cd .next/standalone
          zip -r ../../deployment.zip .

      - name: Verify zip contents
        run: |
          echo "--- Zip root ---"
          unzip -l deployment.zip | head -30
          echo "--- Checking .next is present ---"
          unzip -l deployment.zip | grep ".next/BUILD_ID"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deployment.zip   # ✅ single zip, no hidden-dir issues
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: planogramchatbot
          slot-name: Production
          package: deployment.zip   # ✅ deploy the zip directly
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_18CC8567389144B39056FAF1AB0C8A7F }}
