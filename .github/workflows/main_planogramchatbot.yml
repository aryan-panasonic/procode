# Docs for the Azure Web Apps Deploy action:
# https://github.com/Azure/webapps-deploy

name: Build and deploy Node.js app to Azure Web App - planogramchatbot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}

      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
      AZURE_OPENAI_EMBED_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBED_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_SSL: ${{ secrets.POSTGRES_SSL }}

      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: Verify environment variables
        run: |
          echo "AZURE_OPENAI_API_KEY=$([ -n "$AZURE_OPENAI_API_KEY" ] && echo SET || echo MISSING)"
          echo "AZURE_OPENAI_ENDPOINT=$([ -n "$AZURE_OPENAI_ENDPOINT" ] && echo SET || echo MISSING)"
          echo "POSTGRES_URL=$([ -n "$POSTGRES_URL" ] && echo SET || echo MISSING)"

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: planogramchatbot
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_18CC8567389144B39056FAF1AB0C8A7F }}
